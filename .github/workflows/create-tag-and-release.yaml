name: Create Tag and Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  create-tag-and-release:
    permissions:
      contents: write
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Calculate next tag (dry-run)
        id: next_tag
        uses: mathieudutour/github-tag-action@v6.1
        with:
          tag_prefix: ''
          dry_run: true
          github_token: ${{ secrets.PAT }}

      - name: Build release binaries
        shell: bash
        env:
          VERSION: ${{ steps.next_tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${VERSION:-}"
          if [[ -z "$version" ]]; then
            version="dev"
          fi

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi

            output="dist/movietagger-${goos}-${goarch}${ext}"
            echo "Building ${output} (version=${version})"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/davehornigan/MovieTagger/internal/cli.Version=${version}" -o "$output" ./cmd/movietagger
          done

      - name: Bump version and push tag
        id: tag_version
        if: ${{ github.event_name != 'pull_request' }}
        continue-on-error: false
        uses: mathieudutour/github-tag-action@v6.1
        with:
          tag_prefix: ''
          github_token: ${{ secrets.PAT }}

      - name: Create a GitHub release
        if: ${{ github.event_name != 'pull_request' }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          artifacts: dist/*
          artifactErrorsFailBuild: true
          token: ${{ secrets.PAT }}
